name: Code Quality

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/code-quality.yml
      - .cargo/audit.toml
      - package.json
      - package-lock.json
      - eslint.config.js
      - tsconfig.json
      - src/**
      - src-tauri/**
  pull_request:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/code-quality.yml
      - .cargo/audit.toml
      - package.json
      - package-lock.json
      - eslint.config.js
      - tsconfig.json
      - src/**
      - src-tauri/**

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Dependency Graph support
        id: depgraph
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          endpoint="https://api.github.com/repos/${REPO}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}"
          status_code=$(curl -sS -o depgraph-response.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "${endpoint}")

          if [ "${status_code}" = "200" ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "supported=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Dependency Review unsupported for this repository (HTTP ${status_code}). Enable Dependency Graph in settings/security_analysis to activate this check."

      - name: Dependency Review
        if: steps.depgraph.outputs.supported == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Dependency Review skipped
        if: steps.depgraph.outputs.supported != 'true'
        run: |
          echo "Dependency Graph is disabled or unsupported on this repository."
          echo "Enable it at: https://github.com/${{ github.repository }}/settings/security_analysis"

  react-quality:
    name: React Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint + Prettier check)
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build portal
        run: npm run build:portal

  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies for Tauri build checks
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit --file src-tauri/Cargo.lock --deny warnings

  codeql-javascript:
    name: CodeQL (JavaScript / TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
