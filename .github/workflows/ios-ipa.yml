name: iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ios-ipa.yml"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "src-tauri/**"

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Select Xcode
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Ensure xcodegen
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Installing xcodegen (attempt $attempt/3)"
            brew install xcodegen && break
            if [ "$attempt" -eq 3 ]; then
              echo "xcodegen installation failed after retries"
              exit 1
            fi
            sleep 5
          done

          xcodegen --version

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build portal frontend
        run: npm run build:portal

      - name: Init Tauri iOS project
        run: npx tauri ios init --ci

      - name: Build metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build iOS app (unsigned)
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_PATH=$(find src-tauri/gen/apple -name '*.xcodeproj' -print -quit)
          if [ -z "$PROJECT_PATH" ]; then
            echo "No .xcodeproj found under src-tauri/gen/apple"
            exit 1
          fi

          SCHEME=$(xcodebuild -list -project "$PROJECT_PATH" \
            | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag' \
            | sed 's/^[[:space:]]*//' \
            | grep -E '(_iOS$|iOS$)' \
            | head -n 1 \
            | tr -d '\r' \
            | xargs)
          if [ -z "$SCHEME" ]; then
            echo "No iOS scheme found in $PROJECT_PATH"
            xcodebuild -list -project "$PROJECT_PATH"
            exit 1
          fi

          CONFIGURATION=$(xcodebuild -list -project "$PROJECT_PATH" \
            | awk '/Build Configurations:/{flag=1;next}/Schemes:/{flag=0}flag' \
            | sed 's/^[[:space:]]*//' \
            | grep -E '^(release|Release)$' \
            | head -n 1 \
            | tr -d '\r' \
            | xargs)
          if [ -z "$CONFIGURATION" ]; then
            echo "No release configuration found in $PROJECT_PATH"
            xcodebuild -list -project "$PROJECT_PATH"
            exit 1
          fi

          echo "Using scheme: $SCHEME"
          echo "Using configuration: $CONFIGURATION"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build | tee xcodebuild.log

      - name: Dump Xcode Rust script diagnostics
        if: failure()
        shell: bash
        run: |
          DERIVED_DATA_DIR="$HOME/Library/Developer/Xcode/DerivedData"

          if [ ! -d "$DERIVED_DATA_DIR" ]; then
            echo "DerivedData not found at $DERIVED_DATA_DIR, skipping diagnostics."
            exit 0
          fi

          echo "==> Last generated Rust script phase (if any):"
          find "$DERIVED_DATA_DIR" -name 'Script-*.sh' -print0 \
            | xargs -0 ls -td 2>/dev/null \
            | head -n 1 \
            | while read -r SCRIPT; do
                echo "Script path: $SCRIPT"
                sed -n '1,220p' "$SCRIPT"
              done

          echo "==> Last cargo log snippets from DerivedData (if any):"
          find "$DERIVED_DATA_DIR" -type f \( -name '*.log' -o -name '*.txt' \) -print0 \
            | xargs -0 ls -td 2>/dev/null \
            | head -n 20 \
            | while read -r LOG; do
                if grep -qiE 'cargo|error:|tauri|failed' "$LOG"; then
                  echo "---- $LOG"
                  tail -n 120 "$LOG"
                fi
              done

      - name: Package unsigned IPA for SideStore/AltStore
        shell: bash
        run: |
          mkdir -p artifacts/unsigned-ios/payload/Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/*-iphoneos/*.app" -print0 | xargs -0 ls -td 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Unsigned .app not found in DerivedData"
            exit 1
          fi
          cp -R "$APP_PATH" artifacts/unsigned-ios/payload/Payload/
          (
            cd artifacts/unsigned-ios/payload
            /usr/bin/zip -qry ../NoSubVOD-iOS-unsigned.ipa Payload
          )
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" artifacts/unsigned-ios/NoSubVOD-iOS-unsigned-app.zip
          echo "Built unsigned IPA for SideStore/AltStore re-signing and unsigned .app zip for debugging."

      - name: Upload unsigned iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nosubvod-ios-unsigned-${{ steps.meta.outputs.artifact_suffix }}
          path: |
            artifacts/unsigned-ios/*.ipa
            artifacts/unsigned-ios/*.zip
          retention-days: 14
          if-no-files-found: error

      - name: Publish build summary
        if: always()
        shell: bash
        run: |
          {
            echo "## iOS Build Summary"
            echo "- Signing mode: unsigned only"
            echo "- Run: #${GITHUB_RUN_NUMBER}"
            echo "- Commit: ${{ steps.meta.outputs.short_sha }}"
            echo "- Expected output: unsigned IPA for SideStore/AltStore re-signing"
            echo "- Additional output: unsigned .app zipped (debug)"
            echo "- Artifact name: nosubvod-ios-unsigned-${{ steps.meta.outputs.artifact_suffix }}"
          } >> "$GITHUB_STEP_SUMMARY"
