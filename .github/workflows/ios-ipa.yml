name: iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths:
      - '.github/workflows/ios-ipa.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'src-tauri/**'

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build portal frontend
        run: npm run build:portal

      - name: Init Tauri iOS project
        run: npx tauri ios init --ci

      - name: Build IPA (ad-hoc)
        run: npx tauri ios build --export-method ad-hoc

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nosubvod-ios-ipa
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.dSYM
          retention-days: 14
          if-no-files-found: error
