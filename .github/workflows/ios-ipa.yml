name: iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ios-ipa.yml"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "src-tauri/**"

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ipa:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail

          SELECTED_DEVELOPER_DIR=""

          if [ -d "/Applications/Xcode_16.4.app/Contents/Developer" ]; then
            SELECTED_DEVELOPER_DIR="/Applications/Xcode_16.4.app/Contents/Developer"
          else
            LATEST_XCODE_APP=$(find /Applications -maxdepth 1 -type d -name 'Xcode_*.app' 2>/dev/null | sort -V | tail -n 1)
            if [ -n "$LATEST_XCODE_APP" ] && [ -d "$LATEST_XCODE_APP/Contents/Developer" ]; then
              SELECTED_DEVELOPER_DIR="$LATEST_XCODE_APP/Contents/Developer"
            elif [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
              SELECTED_DEVELOPER_DIR="/Applications/Xcode.app/Contents/Developer"
            fi
          fi

          if [ -n "$SELECTED_DEVELOPER_DIR" ] && [ -d "$SELECTED_DEVELOPER_DIR" ]; then
            echo "Selecting Xcode at: $SELECTED_DEVELOPER_DIR"
            sudo xcode-select -s "$SELECTED_DEVELOPER_DIR"
          else
            echo "No explicit Xcode app found in /Applications, using runner default Xcode"
          fi

          xcode-select -p
          xcodebuild -version

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Ensure xcodegen
        run: |
          if command -v xcodegen >/dev/null 2>&1; then
            xcodegen --version
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Installing xcodegen (attempt $attempt/3)"
            brew install xcodegen && break
            if [ "$attempt" -eq 3 ]; then
              echo "xcodegen installation failed after retries"
              exit 1
            fi
            sleep 5
          done

          xcodegen --version

      - name: Install dependencies
        run: npm ci

      - name: Build portal frontend
        run: npm run build:portal

      - name: Init Tauri iOS project
        run: npx tauri ios init --ci

      - name: Force unsigned Xcode settings
        shell: bash
        run: |
          set -euo pipefail
          PBXPROJ_PATH=$(find src-tauri/gen/apple -type f -name 'project.pbxproj' -print -quit)
          if [ -z "$PBXPROJ_PATH" ]; then
            echo "project.pbxproj not found under src-tauri/gen/apple"
            exit 1
          fi

          perl -0pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g; s/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g; s/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g; s/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g; s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g; s/PROVISIONING_PROFILE = [^;]*;/PROVISIONING_PROFILE = "";/g;' "$PBXPROJ_PATH"

          echo "Patched signing settings in $PBXPROJ_PATH"
          grep -E 'CODE_SIGN_STYLE|CODE_SIGNING_ALLOWED|CODE_SIGNING_REQUIRED|DEVELOPMENT_TEAM|PROVISIONING_PROFILE' "$PBXPROJ_PATH" | head -n 40 || true

      - name: Build metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build iOS IPA
        shell: bash
        run: |
          set -euo pipefail
          cat > src-tauri/gen/apple/ci-nosign.xcconfig <<'EOF'
          CODE_SIGN_STYLE = Manual
          CODE_SIGNING_ALLOWED = NO
          CODE_SIGNING_REQUIRED = NO
          DEVELOPMENT_TEAM =
          PROVISIONING_PROFILE_SPECIFIER =
          PROVISIONING_PROFILE =
          EOF

          export XCODE_XCCONFIG_FILE="$PWD/src-tauri/gen/apple/ci-nosign.xcconfig"
          CI=true npx tauri ios build --ci --export-method debugging -- \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM= \
            CODE_SIGN_IDENTITY= \
            PROVISIONING_PROFILE_SPECIFIER= \
            PROVISIONING_PROFILE=

      - name: Collect IPA artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios
          IPA_PATH=$(find src-tauri/gen/apple -type f -name '*.ipa' -print0 | xargs -0 ls -td 2>/dev/null | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found under src-tauri/gen/apple after build"
            find src-tauri/gen/apple -maxdepth 6 -type d -print || true
            exit 1
          fi
          cp "$IPA_PATH" artifacts/ios/NoSubVOD-iOS.ipa
          echo "IPA collected: $IPA_PATH"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nosubvod-ios-${{ steps.meta.outputs.artifact_suffix }}
          path: |
            artifacts/ios/*.ipa
          retention-days: 14
          if-no-files-found: error
